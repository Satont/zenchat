name: zenchat-backend

services:
  postgres:
    image: postgres:18-alpine
    container_name: zenchat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zenchat
      POSTGRES_PASSWORD: zenchat
      POSTGRES_DB: zenchat
    ports:
      - "5432:5432"
    volumes:
      - zenchat-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenchat -d zenchat"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  zenchat-postgres-data:
